<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>CinemaShare Dashboard</title>
        <link rel="stylesheet" href="dashboard.css">
    </head>
    <body>
        <header class="navbar">
            <h1 class="logo">CinemaShare</h1>
            
            <div class="profile-menu">
                <button class="profile-button">
                    <img src="profile-icon.png" alt="Profile Icon" class="profile-icon">
                </button>
            

                <div class="dropdown">
                    <a href="index.html">Logout</a>
                </div>
            </div>
        </header>

            <div class="container">
                <h2>Dashboard</h2>
                <p>Welcome to your CinemaShare dashboard!</p>
            </div>
        
        <script>
            // Dropdown menu functionality
            const profileButton = document.querySelector('.profile-button');
            const dropdown = document.querySelector('.dropdown');

            profileButton.addEventListener('click', () => {
                dropdown.classList.toggle('show');
            });

            // Close the dropdown if the user clicks outside of it
            window.addEventListener('click', (event) => {
                if (!event.target.matches('.profile-button') && !event.target.matches('.profile-icon')) {
                    if (dropdown.classList.contains('show')) {
                        dropdown.classList.remove('show');
                    }
                }
            });
        </script>
    </body>
</html>
